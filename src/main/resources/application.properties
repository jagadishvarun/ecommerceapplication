
spring.application.name=Ecommerce
server.port=8080

# PostgreSQL DataSource
spring.datasource.url=jdbc:postgresql://localhost:5434/ecommerce
spring.datasource.username=ecommerce_user
spring.datasource.password=ecommerce_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT — replace secret with a randomly generated 256-bit Base64 value in production
jwt.secret=c2VjcmV0LWtleS1mb3ItZWNvbW1lcmNlLWp3dC10b2tlbnMtMjAyNi1zdXBlci1zZWN1cmU=
jwt.expiration=86400000
